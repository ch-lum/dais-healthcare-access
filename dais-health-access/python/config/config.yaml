# Facility Processing
facility:
  treatment_columns:
    - specialties
    - procedures
    - equipment
    - description
  top_n_treatments: 5
  drop_null_coords: true
  drop_null_treatments: true

# Survey Processing
survey:
  preserve_columns:
    - district_name
    - state_ut
  numeric_conversion: true
  use_scaling: true

# OpenAI API
openai:
  model: "gpt-4o-mini"
  max_tokens: 4000
  temperature: 0.3
  api_key_env_var: "OPENAI_API_KEY"
  fallback_on_missing_key: true

# Distance Decay
distance_decay:
  function: "piecewise"
  zones:
    - max: 50
      weight: 1.0
    - max: 100
      weight: 0.8
    - max: 200
      weight: 0.5
    - max: 400
      weight: 0.3
    - max: .inf
      weight: 0.15

# Databricks Tables (to be configured by user)
databricks:
  facility_table: "databricks_virtue_foundation_dataset_dais_2026.virtue_foundation_dataset.facilities"
  survey_table: "databricks_virtue_foundation_dataset_dais_2026.virtue_foundation_dataset.nfhs_5_district_health_indicators"
  geo_reference_table: "databricks_virtue_foundation_dataset_dais_2026.virtue_foundation_dataset.india_post_pincode_directory"

# Output
output:
  csv_filename: "priority_table.csv"
  app_recommendations_filename: "app_recommendations.csv"
  output_dir: "./outputs"

# App-facing recommendation model
recommendations:
  top_n_per_treatment: 10
  current_distance_multiplier: 1.8
  min_distance_saved_km: 25
  base_people_affected: 500
  max_people_affected: 20000
  snapshot_mode: "pipeline"
  source_pipeline_version: "python.facility_prioritization.v1"
